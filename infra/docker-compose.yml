services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: teacher
      POSTGRES_USER: teacher
      POSTGRES_PASSWORD: teacher
    ports:
      - "5432:5432"
    volumes:
      - teacher_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teacher -d teacher"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - teacher_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: teacher
      MINIO_ROOT_PASSWORD: teacher-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - teacher_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  teacher_postgres_data:
  teacher_redis_data:
  teacher_minio_data: